kind = "web"
previewPath = "/"
title = "Portale Prenotazioni Lab"
version = "1.0.0"
id = "artifacts/lab-booking"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20363

[services.development]
run = "pnpm --filter @workspace/lab-booking run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lab-booking", "run", "build" ]
publicDir = "artifacts/lab-booking/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20363"
BASE_PATH = "/"
